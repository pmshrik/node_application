<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - 3 Tier App</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Task Manager</h1>
      <p class="subtitle">3-Tier Node.js Application</p>
    </header>

    <section class="form-section">
      <h2>Add New Task</h2>
      <form id="task-form">
        <input type="text" id="title" placeholder="Task title" required>
        <input type="text" id="description" placeholder="Description (optional)">
        <button type="submit">Add Task</button>
      </form>
    </section>

    <section class="tasks-section">
      <h2>Tasks <span id="task-count"></span></h2>
      <div id="task-list" class="task-list"></div>
      <p id="empty-state" class="empty-state">No tasks yet. Add one above!</p>
    </section>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
